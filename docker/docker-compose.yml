name: slay-the-bearboy

services:
  web:
    build:
      context: ../app
      dockerfile: ../docker/Dockerfile
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ../app:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - PORT=${PORT:-3000}
    command: sh -c 'npm install && npm run dev -- -H 0.0.0.0 -p "${PORT:-3000}"'

volumes:
  node_modules:
  next_cache:
