services:
  web:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - PORT=${PORT:-3000}
    command: sh -c 'npm install && npm run dev -- -H 0.0.0.0 -p "${PORT:-3000}"'
    develop:
      watch:
        - path: package.json
          action: sync
          target: /app/package.json
        - path: package-lock.json
          action: sync
          target: /app/package-lock.json

volumes:
  node_modules:
  next_cache:
