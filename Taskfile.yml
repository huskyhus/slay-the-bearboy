version: '3'

vars:
  COMPOSE: docker compose

tasks:
  up:
    desc: コンテナを起動 (バックグラウンド)
    silent: true
    cmds:
      - '{{.COMPOSE}} up -d'
      - 'echo "  URL: http://localhost:3000"'

  down:
    desc: コンテナを停止・削除
    cmd: '{{.COMPOSE}} down'

  lint:
    desc: コンテナ内で lint
    cmd: '{{.COMPOSE}} exec web npm run lint'
